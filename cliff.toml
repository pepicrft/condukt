[remote.github]
owner = "tuist"
repo = "condukt"

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{% if version -%}
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
{% set title = commit.remote.pr_title | default(value=commit.message) -%}
{% set parts = title | split(pat=": ") -%}
{% if parts | length > 1 -%}
- {{ parts | slice(start=1) | join(sep=": ") }}
{% else -%}
- {{ title }}
{% endif %}
{% endfor %}
{% endfor %}
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
commit_parsers = [
  { field = "merge_commit", pattern = "true", skip = true },
  { message = "^\\[Release\\]", skip = true },
  { message = "(?i)(readme|documentation|tutorial|\\bdocs?\\b)", skip = true },
  { message = "(?i)(github actions|\\bworkflow\\b|\\bpipeline\\b|\\bci\\b)", skip = true },
  { message = "^(?i)(test|spec|chore)", skip = true },
  { body = "(?i)security", group = "Security" },
  { message = "^(?i)(fix|bugfix|hotfix|correct|prevent|handle)", group = "Bug Fixes" },
  { message = "^(?i)(feat|add|allow|adapt|create|implement|introduce|make|preserve|rename|support|use)", group = "Features" },
  { message = ".*", group = "Changes" },
]
filter_commits = true
tag_pattern = "[0-9].*"
sort_commits = "oldest"

[bump]
initial_tag = "0.1.0"
