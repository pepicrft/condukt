name: Condukt

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  compile:
    name: Compile without warnings
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install BEAM tooling with mise
        uses: jdx/mise-action@v3
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        run: mix deps.get

      - name: Compile dependencies
        run: mix deps.compile

      - name: Compile without warnings
        run: mix compile --warnings-as-errors

      - name: Upload Mix dependencies
        uses: actions/upload-artifact@v4
        with:
          name: mix-test-build
          path: |
            deps
            _build/test
          if-no-files-found: error

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: compile
    env:
      MIX_ENV: test
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install BEAM tooling with mise
        uses: jdx/mise-action@v3
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Download Mix dependencies
        uses: actions/download-artifact@v4
        with:
          name: mix-test-build
          path: .

      - name: Fetch dependencies
        run: mix deps.get

      - name: Run test suite
        run: mix test

  format:
    name: Check formatting
    runs-on: ubuntu-latest
    needs: compile
    env:
      MIX_ENV: test
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install BEAM tooling with mise
        uses: jdx/mise-action@v3
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Download Mix dependencies
        uses: actions/download-artifact@v4
        with:
          name: mix-test-build
          path: .

      - name: Fetch dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

  credo:
    name: Run Credo
    runs-on: ubuntu-latest
    needs: compile
    env:
      MIX_ENV: test
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install BEAM tooling with mise
        uses: jdx/mise-action@v3
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Download Mix dependencies
        uses: actions/download-artifact@v4
        with:
          name: mix-test-build
          path: .

      - name: Fetch dependencies
        run: mix deps.get

      - name: Run Credo
        run: mix credo --strict
